name: Build Cross-Platform Executables

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                include:
                    - os: ubuntu-latest
                      raw_name: quas
                      release_name: quas-linux
                    - os: windows-latest
                      raw_name: quas
                      release_name: quas-windows.exe
                    - os: macos-latest
                      raw_name: quas
                      release_name: quas-macos

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Install Python
              run: uv python install 3.14

            - name: Sync and install dependencies
              run: uv sync

            - name: Build with Nuitka
              run: uv run build/build.py

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.release_name }}
                  path: dist/${{ matrix.raw_name }}
